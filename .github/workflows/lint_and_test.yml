name: Run linters and tests

on:
  push:
    branches-ignore:
      - "2.x/*"
  pull_request:
    branches-ignore:
      - "2.x/*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  linting:
    name: Linting
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8
        with:
          persist-credentials: false

      - name: Set up Python 3.11
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.11"

      - name: Install Just
        uses: extractions/setup-just@e33e0265a09d6d736e2ee1e0eb685ef1de4669ff
        with:
          just-version: 1.14.0

      - name: Setup environment to run tox
        env:
          UV_SYSTEM_PYTHON: 1
        run:
          just setup-runner

      - name: Run linters
        run:
          just lint

  testing:
    name: Testing (${{ matrix.python_version.tox }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: linting

    strategy:
      fail-fast: true
      matrix:
        python_version:
          - { setup: '3.10',     tox: 'py310',   cov: true  }
          - { setup: '3.11',     tox: 'py311',   cov: true  }
          - { setup: '3.12.3',   tox: 'py312',   cov: true  }  # (1)
          - { setup: '3.13',     tox: 'py313',   cov: true  }
          - { setup: '3.14',     tox: 'py314',   cov: true  }
          - { setup: 'pypy3.10', tox: 'pypy310', cov: false }
          - { setup: 'pypy3.11', tox: 'pypy311', cov: false }

        # (1): 3.12.4 contains backwards-incompatible changes of ForwardRef._evaluate()
        os: ['ubuntu-latest']

    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8
        with:
          persist-credentials: false

      - name: Set up Python 3.11
        uses: actions/setup-python@e797f83bcb11b83ae66e0230d6156d7c80228e7c
        with:
          python-version: ${{ matrix.python_version.setup }}

      - name: Install Just
        uses: extractions/setup-just@e33e0265a09d6d736e2ee1e0eb685ef1de4669ff
        with:
          just-version: 1.14.0

      - name: Setup environment to run tox
        env:
          UV_SYSTEM_PYTHON: 1
        run:
          just setup-runner

      - name: Run tests with coverage
        if: ${{  (matrix.python_version.cov && github.event_name == 'pull_request') }}
        run:
          just inv test-on-ci
            --py-target ${{ matrix.python_version.tox }}
            --cov-output .coverage.${{ matrix.python_version.tox }}

      - name: Store coverage file
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4
        if: ${{  (matrix.python_version.cov && github.event_name == 'pull_request') }}
        with:
          name: coverage-${{ matrix.python_version.tox }}
          path: .coverage.${{ matrix.python_version.tox }}
          if-no-files-found: error
          include-hidden-files: true

      - name: Run tests without coverage
        if: ${{ !(matrix.python_version.cov && github.event_name == 'pull_request') }}
        run:
          just inv test-on-ci
            --py-target ${{ matrix.python_version.tox }}

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    needs: testing
    permissions:
      pull-requests: write

    if: ${{ github.event_name == 'pull_request' }}

    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8
        with:
          persist-credentials: false

      - uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53
        id: download
        with:
          pattern: coverage-*
          merge-multiple: true

      - name: Coverage comment
        id: coverage_comment
        uses: py-cov-action/python-coverage-comment-action@e623398c19eb3853a5572d4a516e10b15b5cefbc
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MERGE_COVERAGE_FILES: true
          MINIMUM_GREEN: 90

      - name: Store Pull Request comment to be posted (for external pr)
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4
        if: steps.coverage_comment.outputs.COMMENT_FILE_WRITTEN == 'true'
        with:
          name: python-coverage-comment-action
          path: python-coverage-comment-action.txt
